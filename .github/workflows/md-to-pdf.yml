name: Convert Resume Markdown to PDF

on:
  push:
    branches:
      - main
    paths:
      - Resume.md

permissions:
  contents: write

jobs:
  build-pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-lang-chinese fonts-noto-cjk

      - name: Convert Resume.md to Resume.pdf
        run: |
          pandoc Resume.md -o Resume.pdf \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK TC" \
            -V geometry:margin=1in \
            -V fontsize=11pt

      - name: Commit generated Resume.pdf
        run: |
          if [ -z "$(git status --porcelain -- Resume.pdf)" ]; then
            echo "No Resume.pdf changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Resume.pdf
          git commit -m "chore: auto-generate Resume.pdf from Resume.md [skip ci]"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
